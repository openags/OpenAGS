<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto-Research Platform</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">
  <!-- markdown-it & highlight.js for markdown rendering and code highlight -->
  <script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <button class="toggle-sidebar" id="toggleSidebar">
        <i class="fas fa-chevron-left"></i>
      </button>
      
      <div class="sidebar-header">
        <a href="#" class="logo">
          <i class="fas fa-flask"></i>
          <span class="logo-text">Auto-Research</span>
        </a>
      </div>
      
      <button class="new-project-btn">
        <i class="fas fa-plus"></i>
        <span>New Project</span>
      </button>
      
      <div class="projects-section">
        <div class="projects-header">My Research Projects</div>
        
        <ul class="project-list">
          <!-- 项目列表由 JS 动态渲染，这里留空 -->
        </ul>
      </div>
      
      <!-- User Profile -->
      <div class="user-profile">
        <div class="avatar">P</div>
        <div class="user-info">
          <div class="user-name">Agent Robot</div>
          <div class="user-status">Premium</div>
        </div>
        <div class="user-actions">
          <button class="user-menu-btn">
            <i class="fas fa-ellipsis-v"></i>
          </button>
        </div>
      </div>
    </aside>
    
    <!-- Main Content -->
    <main class="main-content">
      <!-- Header -->
      <div class="content-header">
        <div class="page-title">
          <h1 id="projectTitle">Select your</h1>
          <span class="separator">•</span>
          <h2 id="projectSection">Research project</h2>
        </div>
      </div>
      
      <!-- Tabs -->
      <div class="tabs">
        <div class="tab" data-tab="chat">Chat</div>
        <div class="tab" data-tab="planner">Planner</div>
        <div class="tab" data-tab="editor">Editor</div>
        <div class="tab" data-tab="browser">Browser</div>
        <div class="tab" data-tab="references">References</div>
      </div>
      
      <!-- Tab Content -->
      <div class="tab-content">
        <!-- Chat Content -->
        <div class="tab-pane" data-tab-content="chat">
          <div class="chat-container">
            <div class="chat-messages"></div>
            <div class="chat-input-container">
              <select class="chat-agent-select">
                <option value="">Select Agent</option>
              </select>
              <input type="text" class="chat-input" placeholder="Type your message...">
              <button class="chat-send" data-action="send">Send</button>
            </div>
          </div>
        </div>

        <!-- Planner Content -->
        <div class="tab-pane" data-tab-content="planner">
          <div class="planner-container">
            <div class="task-tree"></div>
            <div class="task-details">
              <div class="task-info"></div>
              <div class="task-progress"></div>
              <div class="task-actions"></div>
            </div>
          </div>
        </div>

        <!-- Editor Content -->
        <div class="tab-pane" data-tab-content="editor">
          <div class="editor-container">
            <div class="file-explorer">
              <div class="file-tree"></div>
            </div>
            <div class="editor-main">
              <div class="editor-tabs"></div>
              <div class="editor-content"></div>
            </div>
          </div>
        </div>

        <!-- Browser Content -->
        <div class="tab-pane" data-tab-content="browser">
          <div class="browser-container">
            <div class="browser-toolbar">
              <input type="text" class="browser-url" placeholder="Enter URL">
              <div class="browser-controls">
                <button class="back-btn"><i class="fas fa-arrow-left"></i></button>
                <button class="forward-btn"><i class="fas fa-arrow-right"></i></button>
                <button class="refresh-btn"><i class="fas fa-sync"></i></button>
              </div>
            </div>
            <div class="browser-content"></div>
          </div>
        </div>

        <!-- References Content -->
        <div class="tab-pane" data-tab-content="references">
          <div class="references-container">
            <div class="ref-toolbar">
              <input type="text" class="ref-search" placeholder="Search references...">
              <button class="add-ref-btn">
                <i class="fas fa-plus"></i>
                <span>Add Reference</span>
              </button>
            </div>
            <div class="references-content">
              <div class="ref-list"></div>
              <div class="ref-details">
                <h3>Select a reference to view details</h3>
                <div class="ref-details-content"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- JavaScript -->
  <script src="js/services/chatService.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
